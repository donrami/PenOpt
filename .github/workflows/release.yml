name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build && cd ..

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build binary
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build -platform linux/amd64 -clean

      - name: Rename binary
        run: mv build/bin/penopt build/bin/penopt-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: penopt-linux
          path: build/bin/penopt-linux-amd64

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mingw-w64

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build && cd ..

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build binary
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build -platform windows/amd64 -clean

      - name: Rename binary
        run: mv build/bin/penopt.exe build/bin/penopt-windows-amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: penopt-windows
          path: build/bin/penopt-windows-amd64.exe

  build-macos:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build && cd ..

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build binary
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build -platform darwin/${{ matrix.arch }} -clean -nopackage

      - name: Rename binary
        run: mv build/bin/penopt build/bin/penopt-darwin-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: penopt-macos-${{ matrix.arch }}
          path: build/bin/penopt-darwin-${{ matrix.arch }}

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: penopt-linux
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: penopt-windows
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: penopt-macos-amd64
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: penopt-macos-arm64
          path: artifacts/

      - name: Generate release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## Downloads

          | Platform | Arch | Binary |
          |---|---|---|
          | Linux | amd64 | `penopt-linux-amd64` |
          | Windows | amd64 | `penopt-windows-amd64.exe` |
          | macOS | Intel | `penopt-darwin-amd64` |
          | macOS | Apple Silicon | `penopt-darwin-arm64` |

          Full changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            artifacts/penopt-linux-amd64
            artifacts/penopt-windows-amd64.exe
            artifacts/penopt-darwin-amd64
            artifacts/penopt-darwin-arm64
