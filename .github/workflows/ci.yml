name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  test-mcp:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Build MCP binary
        run: go build -o penopt-mcp ./cmd/penopt-mcp

      - name: Run MCP tests
        run: go test -v -timeout 120s ./cmd/penopt-mcp/...

      - name: Vet
        run: go vet ./cmd/penopt-mcp/...
